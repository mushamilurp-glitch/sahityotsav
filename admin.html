<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Koottilanagdi Sector Sahithyotsav</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .admin-page { padding: 80px 0; }
    .admin-header { text-align: center; margin-bottom: 40px; }
    .admin-header h1 { font-size: 2.4rem; margin-bottom: 10px; }
    .admin-header p { color: var(--text-secondary); max-width: 720px; margin: 0 auto; }
    .admin-grid { display: grid; gap: 30px; max-width: 600px; margin: 0 auto; }
    .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 28px; box-shadow: var(--card-shadow); text-align: center; }
    .card h2 { margin-bottom: 20px; color: var(--accent-color); }
    button { width: 100%; background: var(--accent-color); color: #fff; border: none; border-radius: 12px; padding: 16px 24px; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease; }
    button:hover { transform: translateY(-1px); background: var(--accent-dark); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img src="images/logo.png" class="logo1" alt="Logo">
      <img src="images/sah-ml.png" class="logo2" alt="Koottilanagdi Sector Sahithyotsav">
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="donate.html">Donate</a></li>
    </ul>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <section class="admin-page">
    <div class="container">
      <div class="admin-header">
        <h1>Admin Portal</h1>
        <p>Choose an action to manage competition results and leaderboard.</p>
      </div>

      <div class="admin-grid">
        <div class="card">
          <h2>Add Competition Results</h2>
          <p>Enter winners for competitions</p>
          <button onclick="window.location.href='add-results.html'">Go to Add Results</button>
        </div>

        <div class="card">
          <h2>Update Leaderboard</h2>
          <p>Update team scores and results declared count</p>
          <button onclick="window.location.href='update-leaderboard.html'">Go to Update Leaderboard</button>
        </div>
      </div>
    </div>
  </section>

  <script type="module">
    // API Base URL - change this to your backend URL
    const API_BASE = '/api';

    // Check authentication on page load
    async function checkAuth() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        alert('Please sign in to access the admin portal.');
        window.location.href = 'login.html';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/verify`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('Invalid token');
        }

        const data = await response.json();
        if (data.user.role !== 'admin') {
          alert('Admin access required.');
          window.location.href = 'login.html';
          return;
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        alert('Please sign in to access the admin portal.');
        window.location.href = 'login.html';
      }
    }

    // Check auth on page load
    checkAuth();
  </script>

  <script src="script.js"></script>
</body>
</html>
