<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Sahithyotsav</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .gallery-page { padding: 80px 0; }
    .gallery-header { text-align: center; margin-bottom: 40px; }
    .gallery-header h1 { font-size: 2.4rem; margin-bottom: 10px; }
    .gallery-header p { color: var(--text-secondary); max-width: 720px; margin: 0 auto; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .gallery-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .gallery-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    .gallery-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .gallery-card:hover .gallery-image {
      transform: scale(1.05);
    }
    .gallery-info {
      padding: 16px;
    }
    .gallery-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .gallery-meta {
      font-size: 0.9rem;
      color: var(--text-secondary);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .gallery-meta i {
      margin-right: 4px;
    }
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    .loading i {
      font-size: 2.5rem;
      margin-bottom: 15px;
      display: block;
    }
    .no-images {
      text-align: center;
      padding: 60px;
      color: var(--text-secondary);
    }
    .no-images i {
      font-size: 3rem;
      margin-bottom: 15px;
      display: block;
      color: var(--accent-color);
    }
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      max-width: 90%;
      max-height: 90%;
      position: relative;
    }
    .modal-content img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
    }
    .modal-info {
      position: absolute;
      bottom: -60px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
    }
    .modal-info h3 {
      margin: 0 0 5px 0;
      font-size: 1.2rem;
    }
    .modal-info p {
      margin: 0;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img src="images/logo.png" class="logo1" alt="Logo">
      <img src="images/sah-ml.png" class="logo2" alt="Sahithyotsav">
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="donate.html">Donate</a></li>
    </ul>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <section class="gallery-page">
    <div class="container">
      <div class="gallery-header">
        <h1>Event Gallery</h1>
        <p>Capturing the moments and memories from Sahithyotsav competitions and celebrations.</p>
      </div>

      <div id="loadingSpinner" class="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading gallery...</p>
      </div>

      <div id="noImagesMessage" class="no-images" style="display: none;">
        <i class="fas fa-images"></i>
        <h3>No Images Yet</h3>
        <p>Gallery images will be uploaded soon. Check back later!</p>
      </div>

      <div id="galleryGrid" class="gallery-grid" style="display: none;">
        <!-- Gallery cards will be inserted here -->
      </div>
    </div>
  </section>

  <!-- Image Modal -->
  <div id="imageModal" class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-content">
      <img id="modalImage" src="" alt="Gallery Image">
      <div class="modal-info">
        <h3 id="modalTitle"></h3>
        <p id="modalDate"></p>
      </div>
    </div>
  </div>

  <script type="module">
    // API Base URL - change this to your backend URL
    const API_BASE = 'http://localhost:3000/api';

    const loadingSpinner = document.getElementById('loadingSpinner');
    const noImagesMessage = document.getElementById('noImagesMessage');
    const galleryGrid = document.getElementById('galleryGrid');
    const imageModal = document.getElementById('imageModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalDate = document.getElementById('modalDate');
    const modalClose = document.getElementById('modalClose');

    // Function to get image URL (Cloudinary URLs are direct links)
    function getImageUrl(imageUrl) {
      return imageUrl; // Cloudinary provides direct URLs
    }

    // Function to format date
    function formatDate(timestamp) {
      if (!timestamp) return '';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleDateString('en-IN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    async function loadGallery() {
      try {
        const response = await fetch(`${API_BASE}/gallery`);
        if (!response.ok) {
          throw new Error('Failed to fetch gallery');
        }

        const images = await response.json();

        if (images.length === 0) {
          loadingSpinner.style.display = 'none';
          noImagesMessage.style.display = 'block';
          return;
        }

        images.forEach((image) => {
          const imageUrl = image.image_url; // Cloudinary URLs are direct links

          const card = document.createElement('div');
          card.className = 'gallery-card';
          card.onclick = () => openModal(image, imageUrl);

          card.innerHTML = `
            <img src="${imageUrl}" alt="${image.title || 'Gallery Image'}" class="gallery-image" loading="lazy">
            <div class="gallery-info">
              <div class="gallery-title">${image.title || 'Event Photo'}</div>
              <div class="gallery-meta">
                <span><i class="fas fa-calendar"></i> ${formatDate(image.created_at)}</span>
                ${image.category ? `<span><i class="fas fa-tag"></i> ${image.category}</span>` : ''}
              </div>
            </div>
          `;

          galleryGrid.appendChild(card);
        });

        loadingSpinner.style.display = 'none';
        galleryGrid.style.display = 'grid';

      } catch (error) {
        console.error('Error loading gallery:', error);
        loadingSpinner.innerHTML = '<i class="fas fa-exclamation-triangle"></i><p>Error loading gallery. Please refresh the page.</p>';
      }
    }

    function openModal(data, imageUrl) {
      modalImage.src = imageUrl;
      modalTitle.textContent = data.title || 'Event Photo';
      modalDate.textContent = formatDate(data.created_at);
      imageModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      imageModal.style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    modalClose.addEventListener('click', closeModal);
    imageModal.addEventListener('click', (e) => {
      if (e.target === imageModal) {
        closeModal();
      }
    });

    // Load gallery on page load
    loadGallery();
  </script>

  <script src="script.js"></script>
</body>
</html>
