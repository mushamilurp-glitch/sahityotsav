<!DOCTYPE html>
<html>
<head>
  <title>Results</title>
</head>
<body>

<h1>Results</h1>

<select id="category">
  <option value="">Select Category</option>
  <option>LP</option>
  <option>UP</option>
  <option>HS</option>
  <option>HSS</option>
  <option>Junior</option>
  <option>Senior</option>
  <option>General</option>
</select>

<select id="competition">
  <option value="">Select Competition</option>
</select>

<div id="results"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDec5_HyV8LGmOTaDnW7G74mQwT0JVGt00",
    authDomain: "sahityotsav-koottilangadi.firebaseapp.com",
    projectId: "sahityotsav-koottilangadi"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const categories = ["LP", "UP", "HS", "HSS", "Junior", "Senior", "General"];

  const categorySelect = document.getElementById("category");
  const competitionSelect = document.getElementById("competition");
  const container = document.getElementById("results");

  let competitionsData = [];

// When category changes → load competitions
categorySelect.addEventListener("change", async () => {
  const category = categorySelect.value;

  competitionSelect.innerHTML = `<option>Select Competition</option>`;
  container.innerHTML = "";

  if (!category) return;

  const compRef = collection(db, "categories", category, "competitions");
  const snapshot = await getDocs(compRef);

  competitionsData = [];

  snapshot.forEach(doc => {
    const data = doc.data();
    competitionsData.push(data);

    const option = document.createElement("option");
    option.value = data.name;
    option.textContent = data.name;
    competitionSelect.appendChild(option);
  });
});

// When competition selected → show result
competitionSelect.addEventListener("change", () => {
  const selected = competitionSelect.value;

  container.innerHTML = "";

  const result = competitionsData.find(c => c.name === selected);

  if (!result) return;

  container.innerHTML = `
    <h2>${result.name}</h2>
    <p>🥇 ${result.first_name} (${result.first_team})</p>
    <p>🥈 ${result.second_name} (${result.second_team})</p>
    <p>🥉 ${result.third_name} (${result.third_team})</p>
  `;
});

  loadResults();
</script>

</body>
</html>
