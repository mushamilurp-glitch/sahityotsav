<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - Sahithyotsav</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-left">
      <img src="images/logo.png" class="logo1" alt="Logo">
      <img src="images/sah-ml.png" class="logo2" alt="Sahithyotsav">
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="donate.html">Donate</a></li>
    </ul>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <!-- RESULTS PAGE CONTENT -->
  <section class="results-section">
    <div class="container">
      <h1>Competition Results</h1>
      
      <!-- Category & Competition Selection -->
      <div class="filter-section">
        <div class="filter-group">
          <label for="categoryFilter">Select Category:</label>
          <select id="categoryFilter">
            <option value="">-- Choose a Category --</option>
            <option value="LP">LP (Lower Primary)</option>
            <option value="UP">UP (Upper Primary)</option>
            <option value="HS">HS (High School)</option>
            <option value="HSS">HSS (Higher Secondary)</option>
            <option value="Junior">Junior</option>
            <option value="Senior">Senior</option>
            <option value="General">General</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="competitionFilter">Select Competition:</label>
          <select id="competitionFilter" disabled>
            <option value="">-- Choose a Competition --</option>
          </select>
        </div>
      </div>

      <!-- No Selection Message -->
      <div id="noSelectionMessage" class="no-selection-message">
        <i class="fas fa-hand-point-up"></i>
        <p>Please select a category and competition to view results</p>
      </div>

      <!-- Results Overview (Hidden until both are selected) -->
      <div id="resultsContainer" class="results-table-container" style="display: none;">
        <div class="result-header-card">
          <h2 id="resultsHeader">Competition Results</h2>
          <p id="resultsSubtitle" class="results-subtitle">Select a category and competition to view winners.</p>
        </div>
        <div id="resultsGrid" class="results-grid">
          <!-- Dynamic result cards will appear here -->
        </div>
      </div>

      <!-- Loading Spinner -->
      <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <i class="fas fa-spinner"></i>
        <p>Loading results...</p>
      </div>

      <!-- No Results Message -->
      <div id="noResultsMessage" class="no-results-message" style="display: none;">
        <i class="fas fa-inbox"></i>
        <p>No results found for this selection</p>
      </div>
    </div>
  </section>

  <style>
    .result-header-card {
      background: rgba(255,255,255,0.95);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 24px;
      box-shadow: 0 20px 55px rgba(0,0,0,0.08);
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-header-card h2 {
      margin: 0;
      font-size: clamp(2rem, 2.8vw, 2.6rem);
      color: #1a3d6a;
      letter-spacing: -0.02em;
    }
    .results-subtitle {
      margin: 0;
      color: #5b6b80;
      font-size: 1rem;
      max-width: 760px;
    }
    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 20px;
    }
    .result-card {
      background: #ffffff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: 0 16px 35px rgba(38, 78, 119, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .result-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 45px rgba(38, 78, 119, 0.12);
    }
    .result-card .prize-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(21, 101, 192, 0.08);
      color: #1565c0;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 18px;
    }
    .result-card .result-field {
      margin-bottom: 10px;
    }
    .result-summary-header {
      margin-bottom: 20px;
    }
    .result-summary-title {
      display: block;
      font-size: 1.1rem;
      font-weight: 700;
      color: #163d72;
      margin-bottom: 6px;
    }
    .result-summary-text {
      margin: 0;
      color: #5f6f88;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .result-row {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 18px 16px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid rgba(21, 101, 192, 0.12);
      margin-bottom: 16px;
    }
    .result-position {
      min-width: 78px;
      color: #165ea4;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .result-details {
      display: grid;
      gap: 12px;
      flex: 1;
    }
    .result-card .field-title {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      color: #7a8b9d;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .result-card .field-value {
      font-size: 1rem;
      font-weight: 600;
      color: #182f4a;
    }
    @media (max-width: 960px) {
      .results-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 700px) {
      .results-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <!-- Firebase Config -->
  <script type="module">
    // API Base URL - change this to your backend URL
    const API_BASE = '/api';

    // Competition structure for each category (fallback list)
    const competitions = {
      LP: ['Madh Song', 'Elocution', 'Quiz', 'Story Telling', 'Pencil Drawing', 'Water Colouring', 'Language Game', 'Reading Malayalam', 'Reading Arabi-Malayalam', 'Book Test'],
      UP: ['Mappila Song', 'Elocution', 'Quiz', 'Story Telling', 'Pencil Drawing', 'Water Colouring', 'Ganitha Keli', 'Spelling Bee', 'Sudoku', 'Book Test', 'Story Writing'],
      HS: ['Madh Song', 'Mappila Song', 'Elocution Malayalam', 'Elocution English', 'Quiz', 'Poem Recitation Malayalam', 'Poem Recitation Urdu', 'Pencil Drawing', 'Water Colouring', 'Language Game English', 'News Reading', 'Caption Writing', 'Book Test', 'Essay Writing Malayalam', 'Poem Making', 'Story Writing'],
      HSS: ['Mappila Song', 'Urdu Poem Recitation', 'Bhakthi Song', 'Elocution', 'Digital Painting', 'Story Writing', 'Poem Making', 'Essay Writing English', 'Essay Writing Malayalam', 'Quiz', 'Pencil Drawing', 'Water Colouring', 'News Writing', 'Calligraphy Arabic', 'Reel Making', 'Book Test'],
      Junior: ['Sahitya Samvadam', 'Mappila Song', 'Elocution Malayalam', 'Elocution English', 'Elocution Arabic', 'Story Writing', 'Poem Making', 'Book Test', 'Essay Writing Malayalam', 'Essay Writing Arabic', 'Mudravakya Rachana', 'Madh Gana Rachana', 'Quiz', 'Translation Arabic', 'Calligraphy Arabic', 'Social Text', 'Hadees Musabaqa', 'AI Poem Making', 'Reel Making'],
      Senior: ['Political Debate', 'Mappila Song', 'Hamd Urdu', 'Poem Recitation English', 'Elocution Malayalam', 'Elocution English', 'Elocution Urdu', "Musha'ara Alfiya", 'Poem Making', 'Poem Making English', 'Story Writing', 'Book Test', 'Essay Writing Malayalam', 'Essay Writing English', 'Essay Writing Urdu', 'Translation English', 'Madh Gana Rachana', 'Mudravakya Rachana', 'Quiz', 'Feature Writing', 'Social Text', 'Poster Designing', 'E-poster', 'Digital Illustration', 'Dgital Painting'],
      General: ['Spot Magazine', 'Duff', 'Arabana', 'Group Song Cat-A', 'Group Song Cat-B', 'Moulid Recitation', 'Qaseeda Recitation', 'Viplavagaanam', 'Chumarezhuth', 'Malappattu', 'Risala Quiz', 'Qawwali', 'Viplava Gana Rachana', 'Mappilappattu Rachana', 'Project', 'Collage', 'Nasheeda', 'Family Magazine']
    };

    const categoryFilter = document.getElementById('categoryFilter');
    const competitionFilter = document.getElementById('competitionFilter');
    const resultsContainer = document.getElementById('resultsContainer');
    const noSelectionMessage = document.getElementById('noSelectionMessage');
    const noResultsMessage = document.getElementById('noResultsMessage');
    const loadingSpinner = document.getElementById('loadingSpinner');

    // Function to fetch competitions for a category
    async function fetchCompetitionsForCategory(category) {
      try {
        const response = await fetch(`${API_BASE}/results/competitions/${category}`);
        if (!response.ok) {
          throw new Error('Failed to fetch competitions');
        }
        const data = await response.json();
        return data;
      } catch (error) {
        console.error('Error fetching competitions:', error);
        return competitions[category] || [];
      }
    }

    // Update competition dropdown when category changes
    categoryFilter.addEventListener('change', async (e) => {
      const selectedCategory = e.target.value;
      competitionFilter.innerHTML = '<option value="">-- Choose a Competition --</option>';
      competitionFilter.disabled = true;

      if (selectedCategory) {
        loadingSpinner.style.display = 'flex';
        noSelectionMessage.style.display = 'none';

        let comps = await fetchCompetitionsForCategory(selectedCategory);

        if (comps.length > 0) {
          competitionFilter.disabled = false;
          comps.forEach((comp) => {
            const option = document.createElement('option');
            option.value = comp;
            option.textContent = comp;
            competitionFilter.appendChild(option);
          });
        }

        loadingSpinner.style.display = 'none';
        resetResultsView();
      } else {
        resetResultsView();
      }
    });

    // Fetch results when competition changes
    competitionFilter.addEventListener('change', async (e) => {
      const selectedCategory = categoryFilter.value;
      const selectedCompetition = e.target.value;

      if (!selectedCategory || !selectedCompetition) {
        resetResultsView();
        return;
      }

      // Show loading spinner
      resultsContainer.style.display = 'none';
      noSelectionMessage.style.display = 'none';
      noResultsMessage.style.display = 'none';
      loadingSpinner.style.display = 'flex';

      try {
        // Fetch results from API
        const response = await fetch(`${API_BASE}/results/${selectedCategory}/${selectedCompetition}`);
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('No results found');
          }
          throw new Error('Failed to fetch results');
        }

        const data = await response.json();
        const results = Array.isArray(data.results) ? data.results : [];

        if (results.length === 0) {
          throw new Error('No results found');
        }

        const resultsHeader = document.getElementById('resultsHeader');
        const resultsSubtitle = document.getElementById('resultsSubtitle');
        const resultsGrid = document.getElementById('resultsGrid');

        resultsHeader.textContent = `${selectedCategory} - ${selectedCompetition}`;
        resultsSubtitle.textContent = 'Prize winner overview for the selected competition.';
        resultsGrid.innerHTML = '';

        const sortedResults = results.slice().sort((a, b) => {
          const order = ['1st', '2nd', '3rd'];
          return order.indexOf(a.rank) - order.indexOf(b.rank);
        });

        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="result-summary-header">
            <span class="result-summary-title">Winners</span>
            <p class="result-summary-text">All prizes for this competition are shown below.</p>
          </div>
          ${sortedResults.map(result => `
            <div class="result-row">
              <span class="result-position">${result.rank}</span>
              <div class="result-details">
                <div class="result-field">
                  <span class="field-title">Name</span>
                  <span class="field-value">${result.name || 'N/A'}</span>
                </div>
                <div class="result-field">
                  <span class="field-title">Team</span>
                  <span class="field-value">${result.team || 'N/A'}</span>
                </div>
              </div>
            </div>
          `).join('')}
        `;

        resultsGrid.appendChild(card);

        // Show results card
        loadingSpinner.style.display = 'none';
        noSelectionMessage.style.display = 'none';
        noResultsMessage.style.display = 'none';
        resultsContainer.style.display = 'block';

      } catch (error) {
        console.error('Error fetching results:', error);
        loadingSpinner.style.display = 'none';
        if (error.message === 'No results found') {
          noResultsMessage.style.display = 'flex';
          resultsContainer.style.display = 'none';
        } else {
          noResultsMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i><p>Error loading results. Please try again.</p>';
          noResultsMessage.style.display = 'flex';
          resultsContainer.style.display = 'none';
        }
      }
    });

    function resetResultsView() {
      resultsContainer.style.display = 'none';
      noSelectionMessage.style.display = 'flex';
      noResultsMessage.style.display = 'none';
      loadingSpinner.style.display = 'none';
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
