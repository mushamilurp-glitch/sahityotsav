<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Sahithyotsav</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .login-page {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px 40px;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px;
      box-shadow: var(--card-shadow);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .login-header {
      margin-bottom: 30px;
    }
    .login-header i {
      font-size: 3rem;
      color: var(--accent-color);
      margin-bottom: 15px;
    }
    .login-header h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .login-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
    }
    .login-btn {
      width: 100%;
      background: var(--accent-color);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      margin-top: 10px;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }
    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status-message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .status-message.error {
      background: #fee;
      color: #e74c3c;
      border: 1px solid #fcc;
    }
    .status-message.success {
      background: #efe;
      color: #27ae60;
      border: 1px solid #cfc;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img src="images/logo.png" class="logo1" alt="Logo">
      <img src="images/sah-ml.png" class="logo2" alt="Sahithyotsav">
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="donate.html">Donate</a></li>
    </ul>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <section class="login-page">
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-lock"></i>
        <h1>Admin Login</h1>
        <p>Enter your credentials to access the admin panel</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="admin@sahithyotsav.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <div id="statusMessage" class="status-message"></div>
    </div>
  </section>

  <script type="module">
    // API Base URL - change this to your backend URL
    const API_BASE = 'http://localhost:3000/api';

    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const statusMessage = document.getElementById('statusMessage');

    function showMessage(message, isError = false) {
      statusMessage.textContent = message;
      statusMessage.className = `status-message ${isError ? 'error' : 'success'}`;
      statusMessage.style.display = 'block';
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 5000);
    }

    // Check if already logged in
    const token = localStorage.getItem('authToken');
    if (token) {
      // Verify token
      fetch(`${API_BASE}/auth/verify`, {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      })
      .then(response => {
        if (response.ok) {
          // Already logged in, redirect to admin
          window.location.href = 'admin.html';
        } else {
          // Token invalid, remove it
          localStorage.removeItem('authToken');
        }
      })
      .catch(() => {
        localStorage.removeItem('authToken');
      });
    }

    async function login(email, password) {
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Store token
        localStorage.setItem('authToken', data.token);

        showMessage('Login successful! Redirecting...', false);
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1000);

      } catch (error) {
        console.error('Login error:', error);
        let errorMessage = error.message || 'Login failed. Please check your credentials.';

        if (error.message.includes('Invalid credentials')) {
          errorMessage = 'Invalid email or password.';
        } else if (error.message.includes('not found')) {
          errorMessage = 'No account found with this email address.';
        }

        showMessage(errorMessage, true);
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      }
    }

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showMessage('Please enter both email and password.', true);
        return;
      }

      login(email, password);
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
