<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
</head>
<body>

<h1>Leaderboard</h1>

<div id="leaderboard"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    getDocs, 
    doc, 
    getDoc 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔥 REPLACE WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyDec5_HyV8LGmOTaDnW7G74mQwT0JVGt00",
    authDomain: "sahityotsav-koottilangadi.firebaseapp.com",
    projectId: "sahityotsav-koottilangadi"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const container = document.getElementById("leaderboard");

  async function loadLeaderboard() {

    // 🔹 Get global results declared
    const settingsSnap = await getDoc(doc(db, "settings", "general"));
    const resultsDeclared = settingsSnap.data()?.resultsDeclared || 0;

    const header = document.createElement("h2");
    header.innerText = "Results Declared: " + resultsDeclared;
    container.appendChild(header);

    // 🔹 Get leaderboard data
    const snapshot = await getDocs(collection(db, "leaderboard"));

    let teams = [];

    snapshot.forEach(docSnap => {
      teams.push({
        team: docSnap.id,
        team_points: docSnap.data().team_points || 0
      });
    });

    // 🔹 Sort by points
    teams.sort((a, b) => b.team_points - a.team_points);

    // 🔹 Display
    teams.forEach((team, index) => {
      const row = document.createElement("div");

      row.innerHTML = `
        <h3>${index + 1}. ${team.team} - ${team.team_points} pts</h3>
      `;

      container.appendChild(row);
    });
  }

  loadLeaderboard();

</script>

</body>
</html>
