<!DOCTYPE html>
<html>
<head>
  <title>Media Upload</title>
</head>
<body>

<h1>Media Upload Portal</h1>

<input type="file" id="imageFile"><br><br>
<input type="text" id="category" placeholder="Category (Day 1, Stage, etc)"><br><br>

<button onclick="uploadImage()">Upload</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDec5_HyV8LGmOTaDnW7G74mQwT0JVGt00",
    authDomain: "sahityotsav-koottilangadi.firebaseapp.com",
    projectId: "sahityotsav-koottilangadi"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);
  const auth = getAuth(app);

  // 🔐 Protect page
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  async function uploadImage() {
    const file = document.getElementById("imageFile").files[0];
    const category = document.getElementById("category").value;

    if (!file) {
      alert("Select image");
      return;
    }

    const storageRef = ref(storage, "gallery/" + Date.now() + "_" + file.name);

    await uploadBytes(storageRef, file);

    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "gallery"), {
      imageUrl: url,
      category: category,
      createdAt: Date.now()
    });

    alert("Uploaded!");

    document.getElementById("imageFile").value = "";
    document.getElementById("category").value = "";
  }

  window.uploadImage = uploadImage;
</script>

</body>
</html>
