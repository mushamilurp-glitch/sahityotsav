<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Results - Admin Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .admin-page { padding: 80px 0; }
    .admin-header { text-align: center; margin-bottom: 40px; }
    .admin-header h1 { font-size: 2.4rem; margin-bottom: 10px; }
    .admin-header p { color: var(--text-secondary); max-width: 720px; margin: 0 auto; }
    .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 28px; box-shadow: var(--card-shadow); max-width: min(90vw, 800px); margin: 0 auto; }
    .card h2 { margin-bottom: 20px; color: var(--accent-color); }
    .form-row { display: grid; gap: 10px; margin-bottom: 18px; }
    label { font-weight: 600; color: var(--text-secondary); }
    input[type="text"], select {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-primary); color: var(--text-primary);
    }
    button { width: fit-content; background: var(--accent-color); color: #fff; border: none; border-radius: 12px; padding: 12px 24px; font-weight: 700; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease; }
    button:hover { transform: translateY(-1px); background: var(--accent-dark); }
    .status-note { margin-top: 12px; color: var(--text-secondary); font-size: 0.95rem; }
    .button-group { display: flex; flex-wrap: wrap; gap: 12px; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: var(--accent-color); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
    .rank-section { margin-bottom: 30px; }
    .rank-section h3 { margin-bottom: 10px; color: var(--accent-color); font-size: 1.2rem; }
    .winner-entry { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .winner-entry input, .winner-entry select { flex: 1; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-primary); color: var(--text-primary); }
    .winner-entry input::placeholder { color: var(--text-secondary); }
    .remove-winner { background: #e74c3c; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; transition: background 0.2s; }
    .remove-winner:hover { background: #c0392b; }
    .add-winner { background: var(--accent-color); color: white; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
    .add-winner:hover { background: var(--accent-dark); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-left">
      <img src="images/logo.png" class="logo1" alt="Logo">
      <img src="images/sah-ml.png" class="logo2" alt="Sahithyotsav">
    </div>

    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="results.html">Results</a></li>
      <li><a href="leaderboard.html">Leaderboard</a></li>
      <li><a href="events.html">Events</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="donate.html">Donate</a></li>
    </ul>

    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </nav>

  <section class="admin-page">
    <div class="container">
      <div class="admin-header">
        <h1>Add Competition Results</h1>
        <p>Enter the winners for a competition.</p>
      </div>

      <div class="card">
        <h2>Competition Result Entry</h2>
        <div class="form-row">
          <label for="adminCategory">Category</label>
          <select id="adminCategory">
            <option value="">Select category</option>
            <option value="LP">LP</option>
            <option value="UP">UP</option>
            <option value="HS">HS</option>
            <option value="HSS">HSS</option>
            <option value="Junior">Junior</option>
            <option value="Senior">Senior</option>
            <option value="General">General</option>
          </select>
        </div>
        <div class="form-row">
          <label for="adminCompetition">Competition</label>
          <select id="adminCompetition" disabled>
            <option value="">Select competition</option>
          </select>
        </div>

        <!-- Existing Results Section -->
        <div id="existingResultsSection" style="display: none;">
          <h3 style="color: var(--accent-color); margin-top: 20px;">Existing Results</h3>
          <div id="existingResults" class="existing-results-list" style="margin-bottom: 20px;"></div>
          <div class="button-group">
            <button id="editResultsBtn" style="background: #f39c12;">Edit Results</button>
            <button id="deleteResultsBtn" style="background: #e74c3c;">Delete All Results</button>
          </div>
        </div>

        <!-- Add Results Form -->
        <div id="addResultsForm">
          <h3 style="color: var(--accent-color); margin-top: 20px;">Add New Results</h3>
          <div id="winnersContainer"></div>
          <div class="button-group">
            <button id="saveResultBtn">Save Winners</button>
          </div>
        </div>

        <p id="adminResultMessage" class="status-note"></p>
      </div>

      <div class="back-link">
        <a href="admin.html">← Back to Admin Portal</a>
      </div>
    </div>
  </section>

  <script type="module">
    // API Base URL - change this to your backend URL
    const API_BASE = 'http://localhost:3000/api';

    const saveResultBtn = document.getElementById('saveResultBtn');
    const adminResultMessage = document.getElementById('adminResultMessage');

    const competitions = {
      LP: ['Madh Song', 'Elocution', 'Quiz', 'Story Telling', 'Pencil Drawing', 'Water Colouring', 'Language Game', 'Reading Malayalam', 'Reading Arabi-Malayalam', 'Book Test'],
      UP: ['Mappila Song', 'Elocution', 'Quiz', 'Story Telling', 'Pencil Drawing', 'Water Colouring', 'Ganitha Keli', 'Spelling Bee', 'Sudoku', 'Book Test', 'Story Writing'],
      HS: ['Madh Song', 'Mappila Song', 'Elocution Malayalam', 'Elocution English', 'Quiz', 'Poem Recitation Malayalam', 'Poem Recitation Urdu', 'Pencil Drawing', 'Water Colouring', 'Language Game English', 'News Reading', 'Caption Writing', 'Book Test', 'Essay Writing Malayalam', 'Poem Making', 'Story Writing'],
      HSS: ['Mappila Song', 'Urdu Poem Recitation', 'Bhakthi Song', 'Elocution', 'Digital Painting', 'Story Writing', 'Poem Making', 'Essay Writing English', 'Essay Writing Malayalam', 'Quiz', 'Pencil Drawing', 'Water Colouring', 'News Writing', 'Calligraphy Arabic', 'Reel Making', 'Book Test'],
      Junior: ['Sahitya Samvadam', 'Mappila Song', 'Elocution Malayalam', 'Elocution English', 'Elocution Arabic', 'Story Writing', 'Poem Making', 'Book Test', 'Essay Writing Malayalam', 'Essay Writing Arabic', 'Mudravakya Rachana', 'Madh Gana Rachana', 'Quiz', 'Translation Arabic', 'Calligraphy Arabic', 'Social Text', 'Hadees Musabaqa', 'AI Poem Making', 'Reel Making'],
      Senior: ['Political Debate', 'Mappila Song', 'Hamd Urdu', 'Poem Recitation English', 'Elocution Malayalam', 'Elocution English', 'Elocution Urdu', "Musha'ara Alfiya", 'Poem Making', 'Poem Making English', 'Story Writing', 'Book Test', 'Essay Writing Malayalam', 'Essay Writing English', 'Essay Writing Urdu', 'Translation English', 'Madh Gana Rachana', 'Mudravakya Rachana', 'Quiz', 'Feature Writing', 'Social Text', 'Poster Designing', 'E-poster', 'Digital Illustration', 'Dgital Painting'],
      General: ['Spot Magazine', 'Duff', 'Arabana', 'Group Song Cat-A', 'Group Song Cat-B', 'Moulid Recitation', 'Qaseeda Recitation', 'Viplavagaanam', 'Chumarezhuth', 'Malappattu', 'Risala Quiz', 'Qawwali', 'Viplava Gana Rachana', 'Mappilappattu Rachana', 'Project', 'Collage', 'Nasheeda', 'Family Magazine']
    };

    // Check authentication on page load
    async function checkAuth() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        alert('Please sign in to access the admin portal.');
        window.location.href = 'login.html';
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/auth/verify`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('Invalid token');
        }

        const data = await response.json();
        if (data.user.role !== 'admin') {
          alert('Admin access required.');
          window.location.href = 'login.html';
          return;
        }
      } catch (error) {
        console.error('Auth check failed:', error);
        alert('Please sign in to access the admin portal.');
        window.location.href = 'login.html';
      }
    }

    function showMessage(element, text, isError = false) {
      element.textContent = text;
      element.style.color = isError ? '#e74c3c' : 'var(--text-secondary)';
      setTimeout(() => { element.textContent = ''; }, 4000);
    }

    function populateCompetitions(category) {
      const competitionSelect = document.getElementById('adminCompetition');
      competitionSelect.innerHTML = '<option value="">Select competition</option>';
      competitionSelect.disabled = true;

      if (!category || !competitions[category]) {
        return;
      }

      competitions[category].forEach((comp) => {
        const option = document.createElement('option');
        option.value = comp;
        option.textContent = comp;
        competitionSelect.appendChild(option);
      });
      competitionSelect.disabled = false;
    }

    // Check auth on page load
    checkAuth();

    document.getElementById('adminCategory').addEventListener('change', (e) => {
      populateCompetitions(e.target.value);
    });

    // Check for existing results when competition is selected
    adminCompetition.addEventListener('change', async () => {
      const category = adminCategory.value;
      const competition = adminCompetition.value;

      if (category && competition) {
        await checkExistingResults(category, competition);
      } else {
        document.getElementById('existingResultsSection').style.display = 'none';
        document.getElementById('addResultsForm').style.display = 'block';
      }
    });

    // Check for existing results
    async function checkExistingResults(category, competition) {
      try {
        const token = localStorage.getItem('authToken');
        if (!token) {
          showMessage(adminResultMessage, 'Please login first.', true);
          return;
        }

        const response = await fetch(`${API_BASE}/results/${category}/${competition}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.ok) {
          const data = await response.json();
          if (data.results && data.results.length > 0) {
            displayExistingResults(data.results);
            document.getElementById('existingResultsSection').style.display = 'block';
            document.getElementById('addResultsForm').style.display = 'none';
          } else {
            document.getElementById('existingResultsSection').style.display = 'none';
            document.getElementById('addResultsForm').style.display = 'block';
          }
        } else {
          document.getElementById('existingResultsSection').style.display = 'none';
          document.getElementById('addResultsForm').style.display = 'block';
        }
      } catch (error) {
        console.error('Error checking existing results:', error);
        document.getElementById('existingResultsSection').style.display = 'none';
        document.getElementById('addResultsForm').style.display = 'block';
      }
    }

    // Display existing results
    function displayExistingResults(results) {
      const existingResultsDiv = document.getElementById('existingResults');
      existingResultsDiv.innerHTML = '';

      // Group results by rank
      const resultsByRank = {};
      results.forEach(result => {
        if (!resultsByRank[result.rank]) {
          resultsByRank[result.rank] = [];
        }
        resultsByRank[result.rank].push(result);
      });

      // Display results for each rank
      Object.keys(resultsByRank).sort().forEach(rank => {
        const rankSection = document.createElement('div');
        rankSection.className = 'rank-section';
        rankSection.innerHTML = `<h4>${rank} Place Winners</h4>`;

        resultsByRank[rank].forEach(result => {
          const winnerItem = document.createElement('div');
          winnerItem.className = 'winner-item';
          winnerItem.innerHTML = `
            <div class="winner-info">
              <div class="winner-name">${result.name}</div>
              <div class="winner-team">${result.team}</div>
            </div>
          `;
          rankSection.appendChild(winnerItem);
        });

        existingResultsDiv.appendChild(rankSection);
      });
    }

    // Edit results button
    document.getElementById('editResultsBtn').addEventListener('click', async () => {
      const category = adminCategory.value;
      const competition = adminCompetition.value;
      const token = localStorage.getItem('authToken');

      try {
        const response = await fetch(`${API_BASE}/results/${category}/${competition}`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.ok) {
          const data = await response.json();
          populateFormWithExistingResults(data.results);
          document.getElementById('existingResultsSection').style.display = 'none';
          document.getElementById('addResultsForm').style.display = 'block';
        }
      } catch (error) {
        console.error('Error fetching results for edit:', error);
        showMessage(adminResultMessage, 'Error loading results for editing.', true);
      }
    });

    // Populate form with existing results
    function populateFormWithExistingResults(results) {
      // Clear existing form data
      document.querySelectorAll('.winner-name').forEach(input => input.value = '');
      document.querySelectorAll('.winner-team').forEach(select => select.value = '');

      // Group results by rank
      const resultsByRank = {};
      results.forEach(result => {
        if (!resultsByRank[result.rank]) {
          resultsByRank[result.rank] = [];
        }
        resultsByRank[result.rank].push(result);
      });

      // Populate form sections
      Object.keys(resultsByRank).forEach(rank => {
        const section = document.querySelector(`.rank-section[data-rank="${rank}"]`);
        if (section) {
          const entries = section.querySelector('.winner-entries');
          const existingEntries = entries.querySelectorAll('.winner-entry');

          // Clear existing entries except first one
          for (let i = 1; i < existingEntries.length; i++) {
            existingEntries[i].remove();
          }

          // Populate with existing data
          const winners = resultsByRank[rank];
          winners.forEach((winner, index) => {
            let entry;
            if (index === 0) {
              entry = existingEntries[0];
            } else {
              entry = existingEntries[0].cloneNode(true);
              entry.querySelector('.remove-winner').style.display = 'inline-block';
              entries.appendChild(entry);
            }

            entry.querySelector('.winner-name').value = winner.name;
            entry.querySelector('.winner-team').value = winner.team;
          });
        }
      });
    }

    // Delete results button
    document.getElementById('deleteResultsBtn').addEventListener('click', async () => {
      if (!confirm('Are you sure you want to delete all results for this competition? This action cannot be undone.')) {
        return;
      }

      const category = adminCategory.value;
      const competition = adminCompetition.value;
      const token = localStorage.getItem('authToken');

      try {
        const response = await fetch(`${API_BASE}/results/${category}/${competition}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (response.ok) {
          showMessage(adminResultMessage, 'Results deleted successfully.');
          document.getElementById('existingResultsSection').style.display = 'none';
          document.getElementById('addResultsForm').style.display = 'block';
          document.getElementById('adminCompetition').value = '';
        } else {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to delete results');
        }
      } catch (error) {
        console.error('Error deleting results:', error);
        showMessage(adminResultMessage, error.message || 'Error deleting results. Please try again.', true);
      }
    });

    async function saveResult() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        alert('Please sign in again.');
        window.location.href = 'login.html';
        return;
      }

      const category = document.getElementById('adminCategory').value;
      const competition = document.getElementById('adminCompetition').value;

      if (!category || !competition) {
        showMessage(adminResultMessage, 'Please select category and competition.', true);
        return;
      }

      // Collect all winners from the dynamic form
      const winners = [];
      const rankSections = document.querySelectorAll('.rank-section');

      for (const section of rankSections) {
        const rank = section.dataset.rank;
        const points = parseInt(section.dataset.points);
        const winnerEntries = section.querySelectorAll('.winner-entry');

        winnerEntries.forEach((entry) => {
          const nameInput = entry.querySelector('.winner-name');
          const teamSelect = entry.querySelector('.winner-team');

          const name = nameInput.value.trim();
          const team = teamSelect.value.trim();

          if (name && team) {
            winners.push({
              category,
              competition,
              position: rank,
              name,
              team,
              points,
              status: 'Completed'
            });
          }
        });
      }

      if (winners.length === 0) {
        showMessage(adminResultMessage, 'Please enter at least one winner.', true);
        return;
      }

      try {
        // First delete existing results for this competition
        await fetch(`${API_BASE}/results/${category}/${competition}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        // Then add the new results
        const response = await fetch(`${API_BASE}/results`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ results: winners })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to save results');
        }

        // Clear form
        document.getElementById('adminCompetition').value = '';
        document.getElementById('adminCategory').value = '';
        document.getElementById('adminCompetition').disabled = true;

        // Clear all winner inputs
        document.querySelectorAll('.winner-name').forEach(input => input.value = '');
        document.querySelectorAll('.winner-team').forEach(select => select.value = '');

        showMessage(adminResultMessage, 'Winners saved successfully.');

      } catch (error) {
        console.error('Error saving results:', error);
        showMessage(adminResultMessage, error.message || 'Error saving results. Please try again.', true);
      }
    }

    saveResultBtn.addEventListener('click', saveResult);

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('add-winner')) {
        const section = e.target.closest('.rank-section');
        const entries = section.querySelector('.winner-entries');
        const newEntry = entries.querySelector('.winner-entry').cloneNode(true);

        newEntry.querySelector('.winner-name').value = '';
        newEntry.querySelector('.winner-team').value = '';
        newEntry.querySelector('.remove-winner').style.display = 'inline-block';

        entries.appendChild(newEntry);
      } else if (e.target.classList.contains('remove-winner')) {
        const entry = e.target.closest('.winner-entry');
        const entries = entry.parentElement;

        if (entries.children.length > 1) {
          entry.remove();
        }
      }
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
